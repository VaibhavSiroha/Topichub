<div class="tp-card">
  <div class="tp-card__head">
    <h3>Browse Topics</h3>
  </div>
  <div class="tp-card__body">
    <ul class="tp-topics">
      <li>
        <a href="{% url 'home' %}" class="active">All <span>{{ topics.count }}</span></a>
      </li>
      {% for topic in topics %}
      <li>
        <a href="{% url 'home' %}?q={{ topic.name }}">{{ topic.name }} <span>{{ topic.room_set.all.count }}</span></a>
      </li>
      {% endfor %}
    </ul>
    <a class="tp-link" style="margin-top: 12px;" href="{% url 'topics' %}">
      View all topics
      <svg width="14" height="14" viewBox="0 0 32 32" fill="currentColor"><path d="M16 21l-13-13h-3l16 16 16-16h-3l-13 13z"></path></svg>
    </a>
  </div>
</div>
