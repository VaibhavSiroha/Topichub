{% extends 'main.html' %}

{% block content %}
<main class="tp-page">
  <div class="tp-container">
    <div class="tp-panel">
      <div class="tp-panel__head">
        <a href="{% url 'home' %}" class="tp-back">
          <svg viewBox="0 0 32 32"><path d="M13.723 2.286l-13.723 13.714 13.719 13.714 1.616-1.611-10.96-10.96h27.625v-2.286h-27.625l10.965-10.965-1.616-1.607z"></path></svg>
        </a>
        <h1>Edit your profile</h1>
      </div>

      <div class="tp-card">
        <div class="tp-card__body">
          <div style="display:flex;justify-content:center;margin-bottom:22px;">
            <img id="preview-avatar" class="tp-avatar tp-avatar--lg" src="{{ request.user.avatar.url }}" />
          </div>
          <form class="tp-form" action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
            <div class="tp-field">
              <label for="{{ field.id_for_label }}">{{ field.label }}</label>
              {{ field }}
            </div>
            {% endfor %}
            <div class="tp-form__actions">
              <a class="tp-btn tp-btn--ghost" href="{% url 'home' %}">Cancel</a>
              <button class="tp-btn tp-btn--primary" type="submit">Update Profile</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>
{% endblock content %}
