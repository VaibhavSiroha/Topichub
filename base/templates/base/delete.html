{% extends 'main.html' %}

{% block content %}
<main class="tp-page">
  <div class="tp-container">
    <div class="tp-panel" style="max-width: 480px;">
      <div class="tp-panel__head">
        <a href="{{ request.META.HTTP_REFERER }}" class="tp-back">
          <svg viewBox="0 0 32 32"><path d="M13.723 2.286l-13.723 13.714 13.719 13.714 1.616-1.611-10.96-10.96h27.625v-2.286h-27.625l10.965-10.965-1.616-1.607z"></path></svg>
        </a>
        <h1>Confirm delete</h1>
      </div>

      <div class="tp-card">
        <div class="tp-card__body">
          <form class="tp-form" method="POST" action="">
            {% csrf_token %}
            <p style="margin:0;font-size:15px;">
              Are you sure you want to delete <strong>“{{ obj }}”</strong>? This can't be undone.
            </p>
            <div class="tp-form__actions">
              <a class="tp-btn tp-btn--ghost" href="{{ request.META.HTTP_REFERER }}">Cancel</a>
              <button class="tp-btn tp-btn--danger" type="submit">Delete</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>
{% endblock content %}
