{% extends 'main.html' %}

{% block content %}
<main class="tp-page">
  <div class="tp-container">
    <div class="tp-panel">
      <div class="tp-panel__head">
        <a href="{{ request.META.HTTP_REFERER }}" class="tp-back">
          <svg viewBox="0 0 32 32"><path d="M13.723 2.286l-13.723 13.714 13.719 13.714 1.616-1.611-10.96-10.96h27.625v-2.286h-27.625l10.965-10.965-1.616-1.607z"></path></svg>
        </a>
        <h1>{% if room %}Update Room{% else %}Create a Room{% endif %}</h1>
      </div>

      <div class="tp-card">
        <div class="tp-card__body">
          <form class="tp-form" action="" method="POST">
            {% csrf_token %}

            <div class="tp-field">
              <label for="room_topic">Topic</label>
              <input required type="text" value="{{ room.topic.name }}" name="topic" list="topic-list" id="room_topic" placeholder="e.g. Python, Design, Startups" />
              <datalist id="topic-list">
                {% for topic in topics %}
                <option value="{{ topic.name }}">{{ topic.name }}</option>
                {% endfor %}
              </datalist>
            </div>

            <div class="tp-field">
              <label for="id_name">Room Name</label>
              {{ form.name }}
            </div>

            <div class="tp-field">
              <label for="id_description">Description</label>
              {{ form.description }}
            </div>

            <div class="tp-form__actions">
              <a class="tp-btn tp-btn--ghost" href="{{ request.META.HTTP_REFERER }}">Cancel</a>
              <button class="tp-btn tp-btn--primary" type="submit">Save Room</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>
{% endblock content %}
