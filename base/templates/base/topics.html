{% extends 'main.html' %}

{% block content %}
<main class="tp-page">
  <div class="tp-container">
    <div class="tp-panel">
      <div class="tp-panel__head">
        <a href="{% url 'home' %}" class="tp-back">
          <svg viewBox="0 0 32 32"><path d="M13.723 2.286l-13.723 13.714 13.719 13.714 1.616-1.611-10.96-10.96h27.625v-2.286h-27.625l10.965-10.965-1.616-1.607z"></path></svg>
        </a>
        <h1>Browse Topics</h1>
      </div>

      <div class="tp-card">
        <div class="tp-card__body">
          <form action="" method="GET" class="tp-search" style="max-width: none; margin-bottom: 20px;">
            <svg viewBox="0 0 32 32"><path d="M32 30.586l-10.845-10.845c1.771-2.092 2.845-4.791 2.845-7.741 0-6.617-5.383-12-12-12s-12 5.383-12 12c0 6.617 5.383 12 12 12 2.949 0 5.649-1.074 7.741-2.845l10.845 10.845 1.414-1.414zM12 22c-5.514 0-10-4.486-10-10s4.486-10 10-10c5.514 0 10 4.486 10 10s-4.486 10-10 10z"></path></svg>
            <input name="q" value="{{ q }}" placeholder="Search for topics" />
          </form>

          <div class="tp-chip-row">
            <a href="{% url 'topics' %}" class="tp-chip active">All <span>{{ topics.count }}</span></a>
            {% for topic in topics %}
            <a href="{% url 'home' %}?q={{ topic.name }}" class="tp-chip">{{ topic.name }} <span>{{ topic.room_set.all.count }}</span></a>
            {% empty %}
            <p class="tp-muted">No topics match your search.</p>
            {% endfor %}
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
{% endblock content %}
