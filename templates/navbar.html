{% load static %}
<header class="tp-header">
  <div class="tp-container tp-header__inner">
    <a href="{% url 'home' %}" class="tp-brand">
      <span class="tp-brand__mark">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 5a2 2 0 0 1 2-2h9l5 5v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5Z" fill="currentColor" opacity="0.35"/>
          <path d="M8 8h6M8 12h8M8 16h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="tp-brand__name">Topic<span>hub</span></span>
    </a>

    <form class="tp-search" method="GET" action="{% url 'home' %}">
      <svg viewBox="0 0 32 32">
        <path d="M32 30.586l-10.845-10.845c1.771-2.092 2.845-4.791 2.845-7.741 0-6.617-5.383-12-12-12s-12 5.383-12 12c0 6.617 5.383 12 12 12 2.949 0 5.649-1.074 7.741-2.845l10.845 10.845 1.414-1.414zM12 22c-5.514 0-10-4.486-10-10s4.486-10 10-10c5.514 0 10 4.486 10 10s-4.486 10-10 10z"></path>
      </svg>
      <input name="q" placeholder="Search topics, rooms, people…" />
    </form>

    <nav class="tp-nav">
      <a href="{% url 'home' %}" class="tp-nav__link">Home</a>
      <a href="{% url 'topics' %}" class="tp-nav__link">Topics</a>
      <a href="{% url 'activity' %}" class="tp-nav__link">Activity</a>

      {% if request.user.is_authenticated %}
      <a href="{% url 'create-room' %}" class="tp-btn tp-btn--primary tp-btn--sm">
        <svg width="16" height="16" viewBox="0 0 32 32" fill="currentColor"><path d="M16.943 0.943h-1.885v14.115h-14.115v1.885h14.115v14.115h1.885v-14.115h14.115v-1.885h-14.115v-14.115z"></path></svg>
        Create Room
      </a>

      <div class="tp-user">
        <button class="tp-user__toggle dropdown-button" type="button">
          <img class="tp-avatar tp-avatar--xs" src="{{ request.user.avatar.url }}" />
          <span class="tp-user__name">{{ request.user.username }}</span>
          <svg viewBox="0 0 32 32"><path d="M16 21l-13-13h-3l16 16 16-16h-3l-13 13z"></path></svg>
        </button>
        <div class="dropdown-menu">
          <a href="{% url 'user-profile' request.user.id %}" class="dropdown-link">
            <svg viewBox="0 0 32 32"><path d="M18 22.082v-1.649c2.203-1.241 4-4.337 4-7.432 0-4.971 0-9-6-9s-6 4.029-6 9c0 3.096 1.797 6.191 4 7.432v1.649c-6.784 0.555-12 3.888-12 7.918h28c0-4.030-5.216-7.364-12-7.918z"></path></svg>
            My Profile
          </a>
          <a href="{% url 'update-user' %}" class="dropdown-link">
            <svg viewBox="0 0 32 32"><path d="M27.465 32c-1.211 0-2.35-0.471-3.207-1.328l-9.392-9.391c-2.369 0.898-4.898 0.951-7.355 0.15-3.274-1.074-5.869-3.67-6.943-6.942-0.879-2.682-0.734-5.45 0.419-8.004 0.135-0.299 0.408-0.512 0.731-0.572 0.32-0.051 0.654 0.045 0.887 0.277l5.394 5.395 3.586-3.586-5.394-5.395c-0.232-0.232-0.336-0.564-0.276-0.887s0.272-0.596 0.572-0.732c2.552-1.152 5.318-1.295 8.001-0.418 3.274 1.074 5.869 3.67 6.943 6.942 0.806 2.457 0.752 4.987-0.15 7.358l9.392 9.391c0.844 0.842 1.328 2.012 1.328 3.207-0 2.5-2.034 4.535-4.535 4.535z"></path></svg>
            Settings
          </a>
          <a href="{% url 'logout' %}" class="dropdown-link">
            <svg viewBox="0 0 32 32"><path d="M3 0h22c0.553 0 1 0 1 0.553l-0 3.447h-2v-2h-20v28h20v-2h2l0 3.447c0 0.553-0.447 0.553-1 0.553h-22c-0.553 0-1-0.447-1-1v-30c0-0.553 0.447-1 1-1z"></path><path d="M21.879 21.293l1.414 1.414 6.707-6.707-6.707-6.707-1.414 1.414 4.293 4.293h-14.172v2h14.172l-4.293 4.293z"></path></svg>
            Logout
          </a>
        </div>
      </div>
      {% else %}
      <a href="{% url 'login' %}" class="tp-btn tp-btn--ghost tp-btn--sm">Log in</a>
      <a href="{% url 'register' %}" class="tp-btn tp-btn--primary tp-btn--sm">Sign up</a>
      {% endif %}
    </nav>
  </div>
</header>
